services:
  - type: web
    name: podlearn-api
    runtime: docker
    dockerfilePath: artifacts/api-server/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: TTS_SERVER_URL
        sync: false

  - type: web
    name: podlearn-tts
    runtime: docker
    dockerfilePath: tts-server/Dockerfile
    plan: free
    envVars:
      - key: ELEVENLABS_API_KEY
        sync: false
