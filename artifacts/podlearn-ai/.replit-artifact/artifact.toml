kind = "web"
previewPath = "/"
title = "PodLearn AI"
version = "1.0.0"
id = "artifacts/podlearn-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25829

[services.development]
run = "pnpm --filter @workspace/podlearn-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/podlearn-ai", "run", "build" ]
publicDir = "artifacts/podlearn-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25829"
BASE_PATH = "/"
